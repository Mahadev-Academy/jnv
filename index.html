<html>
<head>

<title>MAT App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
  .countdown-card{
  transition: all .4s ease;
}

.countdown-card.warning{

  background: linear-gradient(
    135deg,
    #7f1d1d,
    #dc2626,
    #f97316
  ) !important;

  box-shadow:
    0 0 20px rgba(239,68,68,.35),
    0 12px 35px rgba(249,115,22,.25);

  animation: countdownPulse 1.8s infinite;
}

@keyframes countdownPulse{

  0%,100%{
    transform: scale(1);
  }

  50%{
    transform: scale(1.02);
  }

}
  .premium-test-page{
  position:relative;
  padding-bottom:120px;
}

.timer-dot-live{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff5252;
  margin-bottom:6px;
  animation:pulse 1s infinite;
}
.ultra-timer{

  display:flex;
  align-items:center;
  gap:8px;

  height:40px;

  padding:0 14px;

  border-radius:999px;

  background:rgba(255,255,255,.12);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.18);

  box-shadow:
    0 6px 18px rgba(0,0,0,.18);

  overflow:hidden;
}

.live-ping{

  width:9px;
  height:9px;

  border-radius:50%;

  background:#ff3b30;

  box-shadow:
    0 0 8px #ff3b30,
    0 0 18px #ff3b30;

  animation:livePulse .9s infinite;
}

.live-text{

  color:#00e676;

  font-size:10px;

  font-weight:900;

  letter-spacing:1px;
}

.ultra-timer #floatingTimerText{
  color:#00ff88;
  font-size:17px;
  font-weight:900;
}
.ultra-timer{
  background:#0f172a;
  border:1px solid rgba(0,255,136,.35);

  box-shadow:
    0 0 15px rgba(0,255,136,.15),
    0 6px 18px rgba(0,0,0,.25);
}

@keyframes livePulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.6);
  }

  100%{
    transform:scale(1);
  }

}
.test-topbar{
  display:flex;
  justify-content:center;

  align-items:center;
  gap:12px;

  background:transparent;

  padding:4px 0;

  margin-bottom:0;
}

.attempt-box{
  display:flex;
  align-items:center;
  gap:4px;

  padding:8px 12px;

  border-radius:12px;

  background:rgba(255,255,255,.12);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.18);

  font-weight:800;

  white-space:nowrap;

  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:50px;
  overflow:hidden;
  margin-bottom:24px;
}

.premium-progress{
  width:0%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    #00c853,
    #00e676
  );
  transition:.3s ease;
}

.premium-question-card{
  background:#fff;
  border-radius:28px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

.q-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.q-number{
  font-size:14px;
  font-weight:800;

}

.q-badge{

}

.premium-question-text{

}

.premium-options{
  display:grid;
  gap:14px;
}

.premium-option{

  gap:14px;
  align-items:center;

  transition:.25s ease;
}

.premium-option:hover{
  transform:translateY(-2px);
}

.option-key{
  width:42px;
  height:42px;
  border-radius:14px;
  background:#304ffe;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;

}

.option-value{

  font-size:16px;
  font-weight:700;
  line-height:1.6;
}

.premium-selected{

  background:#ecfff1;
  box-shadow:

}

.premium-submit-btn{

  bottom:8px;

  left:50%;

  transform:translateX(-50%);

  width:130px;

  height:42px;

  border:none;

  border-radius:999px;

  background:linear-gradient(
    135deg,
    #00c853,
    #009624
  );

  color:#fff;

  font-size:15px;

  font-weight:800;

  z-index:9999;

  box-shadow:
    0 6px 16px rgba(0,200,83,.25);

}

  .test-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.completed-btn{
  flex:1;
  height:46px;
  border:none;
  border-radius:16px;
  background:#9e9e9e;
  color:#fff;
  font-size:15px;
  font-weight:700;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.analysis-btn{
  width:140px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#00c853,#009624);
  color:#fff;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 6px 18px rgba(0,200,83,.35);
  position:relative;
  overflow:hidden;
}

.analysis-btn:hover{
  transform:translateY(-2px) scale(1.02);
}

.analysis-btn:before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.35),
    transparent
  );
  transition:.7s;
}

.analysis-btn:hover:before{
  left:100%;
}




.analysis-card:hover{

  transform:translateY(-4px);

}

.analysis-card.correct{

  border-left:8px solid #00c853;

}

.analysis-card.wrong{

  border-left:8px solid #ff1744;

}

.question-number{

  font-size:13px;

  font-weight:700;

  color:#666;

  margin-bottom:8px;

}

.question-text{

  font-size:24px;

  font-weight:800;

  line-height:1.5;

  color:#111;

  margin-bottom:22px;

}

.answer-row strong{

  font-weight:800;

}


.analysis-navbar{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
}

.premium-back-btn:active{
  transform:scale(.9);
}

.analysis-mini{
  font-size:12px;
  color:#777;
  font-weight:700;
  letter-spacing:1px;
}

.analysis-big{
  font-size:28px;
  font-weight:900;
}

.premium-score-card{

  position:relative;
  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #17373d 0%,
    #1f4b5b 50%,
    #294e63 100%
  );

  border-radius:34px;

  padding:34px 24px;

  text-align:center;

  color:#fff;

  margin-bottom:24px;

  box-shadow:
    0 15px 40px rgba(0,0,0,.20);

}

.score-glow{

  right:-60px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(255,255,255,.10);
}

.score-ring{
  width:180px;
  height:180px;
  margin:auto;
  border-radius:50%;
  background:
  rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
}

.score-ring-inner{
  width:140px;
  height:140px;
  border-radius:50%;
  background:
  rgba(255,255,255,.16);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.score-main{
  font-size:42px;
  font-weight:900;
}

.score-total{
  font-size:20px;
}

.premium-accuracy{
  margin-top:18px;
  font-size:20px;
  font-weight:800;
}

.premium-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:24px;
}

.stat-box{
  background:rgba(255,255,255,.12);
  border-radius:20px;
  padding:16px;
}

.stat-label{
  font-size:13px;
}

.stat-value{
  margin-top:8px;
  font-size:24px;
  font-weight:900;
}

.premium-analysis-card{
  background:#fff;
  border-radius:28px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

.premium-correct{
  border-left:8px solid #00c853;
}

.premium-wrong{
  border-left:8px solid #ff1744;
}

.question-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.question-badge{
  padding:8px 16px;
  border-radius:50px;
  font-weight:800;
  font-size:14px;
}

.badge-correct{
  background:#e8fff0;
  color:#00a63e;
}

.badge-wrong{
  background:#ffe8ec;
  color:#ff1744;
}

.status-pill{
  padding:8px 14px;
  border-radius:50px;
  font-size:13px;
  font-weight:800;
  color:#fff;
}

.pill-correct{
  background:#00c853;
}

.pill-wrong{
  background:#ff1744;
}

.premium-question{
  font-size:22px;
  font-weight:800;
  line-height:1.6;
  margin-bottom:20px;
}

.premium-answer-card{
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
}

.user-card{
  background:#f8f9ff;
}

.correct-card-ui{
  background:#ecfff1;
}

.answer-title{
  font-size:13px;
  font-weight:700;
  color:#666;
  margin-bottom:10px;
}

.answer-value{
  font-size:17px;
  line-height:1.7;
  font-weight:700;
}

.correct-answer-text{
  color:#00a63e;
}

.wrong-answer-text{
  color:#ff1744;
}


.show-exp-btn{

  width:100%;

  border:none;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #304ffe,
    #1e40ff
  );

  color:#fff;

  padding:16px;

  font-size:15px;

  font-weight:800;

  margin-top:16px;

  cursor:pointer;

  transition:.3s ease;

  box-shadow:
  0 8px 22px rgba(41,79,254,.28);

}

.show-exp-btn:hover{

  transform:translateY(-2px);

}

.hidden-exp{

  max-height:0;

  overflow:hidden;

  transition:max-height .45s ease;

}

.exp-inner{

  margin-top:16px;

  background:
  linear-gradient(
    135deg,
    #f8f9ff,
    #eef3ff
  );

  border-radius:22px;

  padding:20px;

  font-size:16px;

  line-height:1.9;

  color:#333;

  border:1px solid #dfe7ff;

}

.analysis-loading{
  text-align:center;
  margin-top:100px;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #ddd;
  border-top:5px solid #00c853;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}
/* ===== PREMIUM HERO V2 ===== */

.hero-bg-glow{

.hero-top{

.hero-greeting{

.hero-class{

.hero-divider{

.hero-features{

.feature-chip{

  padding:10px 14px;

  background:
  rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

}
.hero-mini{

.hero-v3{

  overflow:hidden;

  background:linear-gradient(

  );

:root{
  --primary:#2e7d32;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#777;
  --danger:#ff5252;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins', sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.header{

  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  align-items:center;
  justify-content:space-between;

  width:100%;
  max-width:420px;

  margin:0 auto;

  padding:10px 14px;

  background:rgba(20,50,28,.92);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 8px 24px rgba(0,0,0,.12);
}

.nav-left{

  display:flex;
  align-items:center;

  gap:10px;

  min-width:0;

  flex:1;
}

.logo-img{

  width:42px;
  height:42px;

  border-radius:50%;

  object-fit:cover;

  flex-shrink:0;

  border:2px solid rgba(255,255,255,.18);

  box-shadow:
    0 4px 12px rgba(0,0,0,.18);
}

.brand-wrap{

  display:flex;
  flex-direction:column;

  min-width:0;
}

.brand-title{

  color:#fff;

  font-size:15px;
  font-weight:800;

  line-height:1.1;

  white-space:nowrap;
}

.brand-subtitle{

  color:rgba(255,255,255,.72);

  font-size:11px;

  font-weight:600;

  letter-spacing:.8px;
}

.nav-right{

  display:flex;
  align-items:center;

  gap:8px;

  flex-shrink:0;
}

.nav-icon-btn,
.nav-logout-btn{

  height:38px;

  border:none;

  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.25s ease;
}

.nav-icon-btn{

  width:38px;

  background:rgba(255,255,255,.12);

  color:#fff;

  font-size:18px;
}

.nav-logout-btn{

  padding:0 14px;

  background:#ef4444;

  color:#fff;

  font-size:13px;
  font-weight:700;
}

.nav-icon-btn:hover,
.nav-logout-btn:hover{

  transform:translateY(-1px);
}

@media(max-width:420px){

  .header{

    padding:10px 12px;
  }

  .brand-title{

    font-size:14px;
  }

  .brand-subtitle{

    font-size:10px;
  }

  .nav-logout-btn{

    padding:0 12px;
    font-size:12px;
  }

}

/* WRAPPER */
.wrapper{
  max-width:440px;
  margin:auto;
  padding:12px;
}

/* LOGIN */
.login-card{
  background:var(--card);
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.logo{font-size:38px;margin-bottom:8px;}
.title{font-size:20px;font-weight:600;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}

.input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:8px;
  cursor:pointer;
}

/* DASHBOARD */
.test-card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.test-name{
  font-size:15px;
  font-weight:600;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.start-btn{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:14px;
}

/* TEST */
.container{padding:8px;}


.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}


/* PERFORMANCE */
button, .option{
  touch-action: manipulation;
}

.status-box{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  text-align:center;
  font-weight:500;
}

.status-box.default{ background:#e8f0fe; color:#1a73e8; }
.status-box.loading{ background:#fff4e5; color:#ff9800; }
.status-box.success{ background:#e6f4ea; color:#2e7d32; }
.status-box.error{ background:#fdecea; color:#d32f2f; }

.upcoming-test-card .premium-live-badge{

  min-width:96px;

  height:36px;

  font-size:11px;
}

.upcoming-test-card .premium-info-grid{

  gap:10px;
}

.upcoming-test-card .info-box{

  padding:12px;

  border-radius:16px;

  background:rgba(255,255,255,.14);

  border:1px solid rgba(255,255,255,.18);

  backdrop-filter:blur(10px);
}

.upcoming-test-card .info-icon{

  font-size:18px;
}

.upcoming-test-card .info-label{

  font-size:10px;

  color:rgba(255,255,255,.72);
}

.upcoming-test-card .info-value{

  font-size:13px;

  color:#fff;
}

.upcoming-syllabus-box{

  margin-top:12px;

  padding:10px 12px;

  border-radius:14px;

  background:rgba(255,255,255,.16);

  border:1px solid rgba(255,255,255,.18);
}

.upcoming-syllabus-title{

  font-size:10px;

  font-weight:800;

  letter-spacing:.8px;

  text-transform:uppercase;

  color:rgba(255,255,255,.75);

  margin-bottom:4px;
}

.upcoming-syllabus-text{

  font-size:12px;

  line-height:1.4;

  font-weight:700;

  color:#fff;

  display:-webkit-box;

  -webkit-line-clamp:2;

  -webkit-box-orient:vertical;

  overflow:hidden;
}

.upcoming-test-card .unlock-banner{

  margin-top:12px;

  min-height:46px;

  border-radius:14px;

  font-size:14px;

  background:linear-gradient(
    135deg,
    #f59e0b,
    #f97316
  );

  box-shadow:
    0 8px 18px rgba(249,115,22,.32);
}

.upcoming-test-card .analysis-btn{

  height:46px;
}

@media(max-width:420px){

  .upcoming-test-card{

    padding:14px !important;
  }

  .upcoming-test-card .premium-test-title{

    font-size:18px;
  }
}
/* Last 2 Hours Warning Mode */

.upcoming-test-card.urgent{

  background:linear-gradient(
    135deg,
    #dc2626 0%,
    #f97316 55%,
    #facc15 100%
  ) !important;

  animation:urgentPulse 1.5s infinite;

  box-shadow:
    0 0 18px rgba(249,115,22,.45),
    0 14px 32px rgba(220,38,38,.35) !important;
}

.upcoming-test-card.urgent .info-box,
.upcoming-test-card.urgent .upcoming-syllabus-box{

  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.22);
}

.upcoming-test-card.urgent .unlock-banner{

  background:linear-gradient(
    135deg,
    #b91c1c,
    #ef4444
  ) !important;

  color:#fff;
}

@keyframes urgentPulse{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.02);
  }

}
.logo{

  display:flex;
  justify-content:center;
  margin-bottom:20px;

}

.login-logo{

  width:260px;
  height:260px;

  border-radius:50%;

  object-fit:cover;

  display:block;

  border:5px solid #ffffff;

  box-shadow:
    0 8px 24px rgba(0,0,0,.18);

  background:#fff;

}
</style>
